[tools]
"vfox:mise-plugins/vfox-clang" = "22.1.3"
cmake = "4.3.2"
flutter = "3.41.9-stable"
java = "21"
ninja = "1.13.2"

[env]
ANDROID_HOME = "{{env.HOME}}/Android/Sdk"
ANDROID_SDK_ROOT = "{{env.HOME}}/Android/Sdk"
_.path = [
  "{{env.HOME}}/Android/Sdk/cmdline-tools/latest/bin",
  "{{env.HOME}}/Android/Sdk/platform-tools",
]

[tasks.install]
description = "Install Dart dependencies and Git hooks."
run = [
  "flutter pub get",
  "tools/install-git-hooks",
]

[tasks.install-git-hooks]
description = "Install committed Git hooks."
run = "tools/install-git-hooks"

[tasks.install-apt-dev-deps]
description = "Install Debian build dependencies from debian/control."
run = "sudo apt-get update && sudo apt-get --yes build-dep ."

[tasks."android:sdk"]
description = "Install the Android SDK command-line tools."
run = '''
set -eu

sdk="$HOME/Android/Sdk"
tools_url="https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip"
tmp="$(mktemp -d)"
trap 'rm -rf "$tmp"' EXIT

sudo apt-get update
sudo apt-get install --yes curl unzip

mkdir -p "$sdk/cmdline-tools"
curl -fsSL "$tools_url" -o "$tmp/cmdline-tools.zip"
unzip -q "$tmp/cmdline-tools.zip" -d "$tmp"

rm -rf "$sdk/cmdline-tools/latest"
mkdir -p "$sdk/cmdline-tools/latest"
mv "$tmp/cmdline-tools/"* "$sdk/cmdline-tools/latest/"

yes | "$sdk/cmdline-tools/latest/bin/sdkmanager" --licenses
"$sdk/cmdline-tools/latest/bin/sdkmanager" \
  "cmdline-tools;latest" \
  "platform-tools" \
  "platforms;android-35" \
  "build-tools;35.0.0"

echo "Android SDK installed at $sdk"
'''

[tasks.fmt]
description = "Check Dart formatting."
run = "dart format --set-exit-if-changed ."

[tasks.test]
description = "Run Flutter tests."
run = "flutter test"

[tasks.gui]
description = "Launch the app on an available Flutter target."
run = "CC=clang CXX=clang flutter run"

[tasks.package-deb]
description = "Build the Flutter Linux app as a Debian package."
run = "tools/package-deb"

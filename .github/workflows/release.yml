name: Build cross-platform app

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: sudo apt-get update
      - run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good libv4l-dev
      - run: flutter create --platforms=linux .
      - run: flutter build linux --release

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=android .
      - run: python3 -c "from pathlib import Path; p=Path('android/app/src/main/AndroidManifest.xml'); s=p.read_text(); permission='<uses-permission android:name=\"android.permission.CAMERA\" />'; p.write_text(s.replace('<application', permission + '\\n    <application') if permission not in s else s)"
      - run: flutter build apk --release

  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=ios,macos .
      - run: /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string Camera access is used to display the virtual mirror preview." ios/Runner/Info.plist
      - run: /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string Camera access is used to display the virtual mirror preview." macos/Runner/Info.plist
      - run: /usr/libexec/PlistBuddy -c "Add :com.apple.security.device.camera bool true" macos/Runner/DebugProfile.entitlements
      - run: /usr/libexec/PlistBuddy -c "Add :com.apple.security.device.camera bool true" macos/Runner/Release.entitlements
      - run: flutter build macos --release
      - run: flutter build ios --release --no-codesign

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=windows .
      - run: flutter build windows --release
